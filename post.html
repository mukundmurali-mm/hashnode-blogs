  <script>(function(){var t=localStorage.getItem('blog-theme')||(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t);if(t==='light'){document.getElementById('hljs-dark').disabled=true;document.getElementById('hljs-light').disabled=false;}})();</script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #07090f;
      --surface: #0f1623;
      --surface2: #141e30;
      --border: #1a2740;
      --border2: #223050;
      --text: #e4ecf7;
      --text2: #8496b0;
      --text3: #4d637d;
      --purple: #a78bfa;
      --purple2: #7c3aed;
      --blue: #60a5fa;
      --cyan: #22d3ee;
      --green: #34d399;
      --orange: #fb923c;
      --r: 10px;
      --nav-bg: rgba(7, 9, 15, 0.85);
    }

    [data-theme="light"] {
      --bg: #f8fafc;
      --surface: #ffffff;
      --surface2: #f1f4f8;
      --border: #e2e8f0;
      --border2: #cbd5e1;
      --text: #0f172a;
      --text2: #475569;
      --text3: #94a3b8;
      --purple: #7c3aed;
      --cyan: #0891b2;
      --nav-bg: rgba(248, 250, 252, 0.88);
    }
    [data-theme="light"] .prose code { background: #f1f4f8; color: #0891b2; border-color: #e2e8f0; }
    [data-theme="light"] .prose pre { box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    [data-theme="light"] .prose tr:nth-child(even) td { background: rgba(0,0,0,0.02); }
    [data-theme="light"] .prose blockquote { background: rgba(124,58,237,0.04); }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      min-height: 100vh;
    }

    /* ── PROGRESS BAR ── */
    #progress {
      position: fixed;
      top: 0; left: 0;
      height: 3px;
      width: 0%;
      background: linear-gradient(90deg, #7c3aed, #3b82f6, #22d3ee);
      z-index: 200;
      transition: width 0.1s linear;
    }

    /* ── NAV ── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      height: 60px;
      padding: 0 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--nav-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }

    .theme-toggle {
      width: 32px; height: 32px;
      border-radius: 8px;
      border: 1px solid var(--border2);
      background: transparent;
      color: var(--text2);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.18s;
    }
    .theme-toggle:hover { color: var(--text); background: var(--surface2); }
    .icon-sun { display: none; }
    .icon-moon { display: block; }
    [data-theme="light"] .icon-sun { display: block; }
    [data-theme="light"] .icon-moon { display: none; }

    .nav-back {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text2);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.18s;
    }
    .nav-back:hover { color: var(--text); }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
    }

    .nav-logo {
      width: 30px; height: 30px;
      border-radius: 7px;
      background: linear-gradient(135deg, #7c3aed, #3b82f6);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 800; color: #fff; letter-spacing: -0.5px;
    }

    .nav-name { font-size: 14px; font-weight: 700; color: var(--text); }

    /* ── COVER IMAGE ── */
    .cover-wrap {
      width: 100%;
      max-height: 420px;
      overflow: hidden;
      position: relative;
    }

    .cover-wrap img {
      width: 100%;
      height: 420px;
      object-fit: cover;
      display: block;
    }

    .cover-overlay {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 200px;
      background: linear-gradient(to top, var(--bg) 0%, transparent 100%);
    }

    /* ── LAYOUT ── */
    .post-layout {
      max-width: 1080px;
      margin: 0 auto;
      padding: 0 32px 100px;
      display: grid;
      grid-template-columns: 1fr 260px;
      gap: 60px;
      align-items: start;
    }

    /* ── ARTICLE ── */
    .post-header { padding: 48px 0 40px; }

    .post-breadcrumb {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text3);
      margin-bottom: 20px;
    }

    .post-breadcrumb a { color: var(--text3); text-decoration: none; }
    .post-breadcrumb a:hover { color: var(--text2); }

    .post-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px; }

    .post-tag {
      padding: 3px 10px;
      border-radius: 6px;
      font-size: 11.5px;
      font-weight: 600;
      font-family: 'JetBrains Mono', monospace;
    }

    .post-title {
      font-size: clamp(26px, 4vw, 40px);
      font-weight: 800;
      letter-spacing: -1.5px;
      line-height: 1.15;
      color: var(--text);
      margin-bottom: 20px;
    }

    .post-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      color: var(--text3);
      flex-wrap: wrap;
    }

    .meta-sep { width: 3px; height: 3px; border-radius: 50%; background: var(--text3); }

    .post-divider {
      height: 1px;
      background: var(--border);
      margin: 32px 0;
    }

    /* ── MARKDOWN CONTENT ── */
    .prose { font-size: 16.5px; line-height: 1.8; color: var(--text2); }

    .prose h1, .prose h2, .prose h3, .prose h4 {
      color: var(--text);
      font-weight: 800;
      letter-spacing: -0.5px;
      scroll-margin-top: 80px;
    }

    .prose h1 { font-size: 28px; margin: 48px 0 18px; letter-spacing: -1px; }
    .prose h2 { font-size: 22px; margin: 40px 0 16px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
    .prose h3 { font-size: 18px; margin: 32px 0 12px; }
    .prose h4 { font-size: 16px; margin: 24px 0 10px; color: var(--text2); }

    .prose p { margin: 0 0 18px; }

    .prose a { color: var(--purple); text-decoration: underline; text-underline-offset: 3px; transition: color 0.18s; }
    .prose a:hover { color: #c4b5fd; }

    .prose strong { color: var(--text); font-weight: 700; }

    .prose em { color: var(--text); font-style: italic; }

    .prose ul, .prose ol {
      margin: 0 0 18px 24px;
      padding: 0;
    }

    .prose li { margin-bottom: 8px; }

    .prose li > p { margin: 0; }

    .prose blockquote {
      margin: 24px 0;
      padding: 16px 20px;
      border-left: 3px solid var(--purple);
      background: rgba(167, 139, 250, 0.05);
      border-radius: 0 8px 8px 0;
      color: var(--text2);
      font-style: italic;
    }

    .prose blockquote p { margin: 0; }

    .prose code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13.5px;
      padding: 2px 6px;
      border-radius: 5px;
      background: var(--surface2);
      color: var(--cyan);
      border: 1px solid var(--border);
    }

    .prose pre {
      margin: 24px 0;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--border);
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }

    .prose pre code {
      font-size: 13.5px;
      padding: 20px;
      border: none;
      background: transparent;
      color: inherit;
      display: block;
      overflow-x: auto;
      line-height: 1.6;
    }

    .prose img {
      max-width: 100%;
      border-radius: 10px;
      margin: 24px auto;
      display: block;
      border: 1px solid var(--border);
    }

    .prose table {
      width: 100%;
      border-collapse: collapse;
      margin: 24px 0;
      font-size: 14.5px;
    }

    .prose th {
      background: var(--surface2);
      color: var(--text);
      font-weight: 700;
      padding: 10px 14px;
      text-align: left;
      border: 1px solid var(--border);
    }

    .prose td {
      padding: 9px 14px;
      border: 1px solid var(--border);
      color: var(--text2);
    }

    .prose tr:nth-child(even) td { background: rgba(255,255,255,0.02); }

    .prose hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 40px 0;
    }

    .prose aside {
      margin: 24px 0;
      padding: 16px 20px;
      border-radius: 10px;
      background: rgba(96, 165, 250, 0.05);
      border: 1px solid rgba(96, 165, 250, 0.15);
      color: var(--text2);
    }

    /* ── SIDEBAR ── */
    .sidebar {
      position: sticky;
      top: 80px;
    }

    .toc-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }

    .toc-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text3);
      margin-bottom: 14px;
    }

    .toc-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .toc-item a {
      display: block;
      padding: 5px 8px;
      border-radius: 6px;
      font-size: 13px;
      color: var(--text3);
      text-decoration: none;
      transition: all 0.15s;
      line-height: 1.4;
    }

    .toc-item a:hover { color: var(--text2); background: var(--surface2); }
    .toc-item.active a { color: var(--purple); background: rgba(167,139,250,0.08); }

    .toc-item.h3 a { padding-left: 18px; font-size: 12px; }
    .toc-item.h4 a { padding-left: 28px; font-size: 11.5px; }

    /* ── LOADING / ERROR ── */
    .loader {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 50vh;
      color: var(--text3);
      font-size: 14px;
      gap: 10px;
    }

    .spinner {
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--purple);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── FOOTER ── */
    .post-footer {
      border-top: 1px solid var(--border);
      padding: 36px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 20px;
      max-width: 1080px;
      margin: 0 auto;
    }

    .pf-brand { font-size: 14px; font-weight: 700; color: var(--text); }
    .pf-sub { font-size: 12px; color: var(--text3); margin-top: 3px; }

    .pf-links { display: flex; gap: 10px; }

    .pf-social {
      width: 34px; height: 34px;
      border-radius: 8px;
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      color: var(--text3);
      text-decoration: none;
      transition: all 0.18s;
    }
    .pf-social:hover { color: var(--text); border-color: var(--border2); background: var(--surface2); }

    /* ── RESPONSIVE ── */
    @media (max-width: 820px) {
      .post-layout { grid-template-columns: 1fr; gap: 0; }
      .sidebar { display: none; }
    }

    @media (max-width: 560px) {
      nav { padding: 0 20px; }
      .post-layout { padding: 0 20px 80px; }
      .post-title { letter-spacing: -1px; }
      .prose { font-size: 15.5px; }
    }
  </style>
</head>

<script>
  const COLORS = {
    ai: '#a78bfa', llm: '#a78bfa', mcp: '#a78bfa', 'mcp-server': '#a78bfa',
    'ai-agents': '#c084fc', 'agentic-ai': '#c084fc', 'claude-code': '#f472b6',
    oci: '#60a5fa', 'oracle-cloud': '#60a5fa', cloud: '#60a5fa',
    steampipe: '#818cf8', terraform: '#818cf8',
    networking: '#22d3ee', 'palo-alto-networks': '#22d3ee',
    devops: '#38bdf8', terminal: '#38bdf8', cli: '#38bdf8',
    productivity: '#34d399', obsidian: '#34d399', notebooklm: '#34d399',
    research: '#34d399', 'note-taking': '#34d399',
    ollama: '#fb923c', llama: '#fb923c', streamlit: '#fb923c',
    promptengineering: '#fbbf24', chatgpt: '#fbbf24', bard: '#fbbf24'
  };

  function tagColor(t) { return COLORS[t] || '#8496b0'; }

  function fmtDate(d) {
    const date = new Date(d);
    if (isNaN(date)) return d;
    return date.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
  }

  function parseFrontmatter(text) {
    const m = text.match(/^---\r?\n([\s\S]*?)\r?\n---\r?\n/);
    if (!m) return { data: {}, content: text };

    const data = {};
    m[1].split('\n').forEach(line => {
      const ci = line.indexOf(':');
      if (ci === -1) return;
      const key = line.slice(0, ci).trim();
      let val = line.slice(ci + 1).trim();
      if (/^["']/.test(val) && /["']$/.test(val)) val = val.slice(1, -1);
      data[key] = val;
    });

    if (data.tags) data.tags = data.tags.split(',').map(t => t.trim()).filter(Boolean);
    else data.tags = [];

    return { data, content: text.slice(m[0].length) };
  }

  function preprocessMarkdown(md) {
    // Fix Hashnode image syntax: ![alt](url align="center") → ![alt](url)
    md = md.replace(/!\[([^\]]*)\]\(([^ )]+)\s+align="[^"]*"\)/g, '![$1]($2)');
    // Remove Obsidian internal image links
    md = md.replace(/!\[\[[^\]]*\]\]/g, '');
    // Remove Obsidian internal wikilinks (keep text)
    md = md.replace(/\[\[([^\]|]*?)(?:\|([^\]]*))?\]\]/g, (_, link, label) => label || link);
    return md;
  }

  function estimateReadTime(text) {
    const words = text.trim().split(/\s+/).length;
    return Math.max(1, Math.ceil(words / 220));
  }

  function addHeadingIds(html) {
    let counter = {};
    return html.replace(/<(h[1-4])([^>]*)>([\s\S]*?)<\/h[1-4]>/gi, (_, tag, attrs, inner) => {
      const text = inner.replace(/<[^>]+>/g, '').trim();
      const base = text.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '');
      counter[base] = (counter[base] || 0) + 1;
      const id = counter[base] > 1 ? `${base}-${counter[base]}` : base;
      return `<${tag}${attrs} id="${id}">${inner}</${tag}>`;
    });
  }

  function buildTOC(html) {
    const headings = [];
    const re = /<(h[2-4])[^>]*id="([^"]*)"[^>]*>([\s\S]*?)<\/h[2-4]>/gi;
    let m;
    while ((m = re.exec(html)) !== null) {
      headings.push({
        level: m[1],
        id: m[2],
        text: m[3].replace(/<[^>]+>/g, '').trim()
      });
    }
    return headings;
  }

  function renderTOC(headings) {
    const toc = document.getElementById('toc');
    if (!headings.length) {
      toc.closest('.toc-box').style.display = 'none';
      return;
    }
    toc.innerHTML = headings.map(h => `
      <li class="toc-item ${h.level}" data-id="${h.id}">
        <a href="#${h.id}">${h.text}</a>
      </li>`).join('');

    const items = toc.querySelectorAll('.toc-item');
    const observer = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          items.forEach(i => i.classList.remove('active'));
          const active = toc.querySelector(`[data-id="${e.target.id}"]`);
          active?.classList.add('active');
        }
      });
    }, { rootMargin: '-60px 0px -80% 0px' });

    document.querySelectorAll('.prose h2, .prose h3, .prose h4').forEach(h => observer.observe(h));
  }

  function setupProgressBar() {
    const bar = document.getElementById('progress');
    window.addEventListener('scroll', () => {
      const total = document.documentElement.scrollHeight - window.innerHeight;
      const pct = total > 0 ? (window.scrollY / total) * 100 : 0;
      bar.style.width = pct + '%';
    }, { passive: true });
  }

  async function loadPost() {
    const id = new URLSearchParams(window.location.search).get('id');
    if (!id) {
      document.getElementById('post-body').innerHTML =
        '<div style="color:var(--text3);padding:60px 0;text-align:center">No post specified. <a href="index.html" style="color:var(--purple)">Go back</a>.</div>';
      return;
    }

    try {
      const res = await fetch(`${id}.md`);
      if (!res.ok) throw new Error('Not found');
      const raw = await res.text();

      const { data, content } = parseFrontmatter(raw);
      const title = data.title || 'Untitled';
      const date = data.datePublished || data.date || '';
      const tags = data.tags || [];
      const cover = data.cover || null;
      const readTime = estimateReadTime(content);

      document.title = `${title} — Mukund Murali`;

      // Cover image
      if (cover) {
        document.getElementById('cover-container').innerHTML = `
          <div class="cover-wrap">
            <img src="${cover}" alt="${title}" onerror="this.parentElement.remove()">
            <div class="cover-overlay"></div>
          </div>`;
      }

      // Post header
      document.getElementById('post-header').innerHTML = `
        <div class="post-breadcrumb">
          <a href="index.html">Blog</a>
          <span>›</span>
          <span>${tags[0] || 'Article'}</span>
        </div>
        <div class="post-tags">
          ${tags.map(t => {
            const c = tagColor(t);
            return `<span class="post-tag" style="background:${c}18;color:${c};border:1px solid ${c}28">${t}</span>`;
          }).join('')}
        </div>
        <h1 class="post-title">${title}</h1>
        <div class="post-meta">
          ${date ? `<span>${fmtDate(date)}</span><span class="meta-sep"></span>` : ''}
          <span>${readTime} min read</span>
        </div>
        <div class="post-divider"></div>`;

      // Configure marked
      marked.setOptions({
        breaks: true,
        gfm: true,
        highlight: (code, lang) => {
          if (lang && hljs.getLanguage(lang)) {
            return hljs.highlight(code, { language: lang }).value;
          }
          return hljs.highlightAuto(code).value;
        }
      });

      // Render content
      const processed = preprocessMarkdown(content);
      let html = marked.parse(processed);
      html = addHeadingIds(html);

      document.getElementById('post-body').innerHTML = html;

      // Post-render: highlight remaining code blocks
      document.querySelectorAll('.prose pre code').forEach(el => {
        if (!el.classList.contains('hljs')) hljs.highlightElement(el);
      });

      // Build TOC
      const headings = buildTOC(html);
      renderTOC(headings);

    } catch (err) {
      document.getElementById('post-body').innerHTML = `
        <div style="color:var(--text3);padding:60px 0;text-align:center">
          Could not load post. <a href="index.html" style="color:var(--purple)">Back to all posts</a>.
        </div>`;
    }
  }

  setupProgressBar();
  loadPost();

  // Theme toggle
  document.getElementById('theme-toggle').addEventListener('click', function() {
    const t = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', t);
    localStorage.setItem('blog-theme', t);
    const isLight = t === 'light';
    document.getElementById('hljs-dark').disabled = isLight;
    document.getElementById('hljs-light').disabled = !isLight;
  });
</script>
</body>
</html>
